                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- 日期 (預設當天) -->
                    <div>
                        <label class="block text-xs text-slate-500 mb-1 font-semibold">交易日期</label>
                        <input type="date" id="txDate" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-rose-400">
                    </div>
                    <!-- 股票代碼 -->
                    <div>
                        <label class="block text-xs text-slate-500 mb-1 font-semibold">股票名稱或代碼</label>
                        <input type="text" id="txStock" required placeholder="例如：2330 台積電" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-rose-400">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- 股數 -->
                    <div>
                        <label id="labelQty" class="block text-xs text-slate-500 mb-1 font-semibold">交易股數</label>
                        <input type="number" id="txQty" required min="1" step="1" oninput="calculateEstimates()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-rose-400">
                    </div>
                    <!-- 單價 -->
                    <div>
                        <label id="labelPrice" class="block text-xs text-slate-500 mb-1 font-semibold">每股單價</label>
                        <input type="number" id="txPrice" required min="0.01" step="0.01" oninput="calculateEstimates()" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-rose-400">
                    </div>
                </div>
